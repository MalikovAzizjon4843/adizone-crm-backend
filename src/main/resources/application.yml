spring:
  application:
    name: crm-system

  servlet:
    multipart:
      max-file-size: 4MB
      max-request-size: 8MB

  datasource:
    url: jdbc:postgresql://localhost:5432/adizone
    username: postgres
    password: root123
#    sercet '@dizone_Crm_2026$$'
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      # update: ishga tushganda entity bo‘yicha yo‘q jadval/ustunlarni DB ga qo‘shadi (o‘chirmaydi).
      # Production: faqat Flyway ishlatish uchun JPA_DDL_AUTO=validate qo‘ying.
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

app:
  upload:
    dir: /opt/crm/uploads
  base-url: https://api.adizone.uz

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 28800000  # 24 hours in ms
  refresh-expiration: 604800000  # 7 days in ms

logging:
  level:
    com.crm: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

